        setTunel(snap.data().tunelRegistros);
      } else {
        setTunel([]);

    });
    return unsub;
  }, [dataAlvo]);

  const agora = new Date();
  const tempoAtual = agora.getHours() * 60 + agora.getMinutes();

  const registrosProcessados = tunel.map((t, idx) => {
    const [h, m] = t.horaEntrada.split(':').map(Number);
    const inicio = h * 60 + m;
    const fim = inicio + (t.tempo || 35);
    const horaFim = `${(Math.floor(fim/60)%24).toString().padStart(2,'0')}:${(fim%60).toString().padStart(2,'0')}`;
    
    // Status: 0 = Aguardando, 1 = Embalando (caindo), 2 = Concluido
    let status = 0;

    // Vamos marcar os que ja passaram ou faltam menos de 5 min como 1.
    if (fim - tempoAtual <= 5) status = 1;

function TelaResumoPCP({ sair }) {

  const painelRef = React.useRef(null);

  useEffect(() => {
    const unsubProd = window.db.collection('producaoDiaria').doc(dataAlvo).onSnapshot(s => {
      if(s.exists) {
        const d = s.data();
        if(d.itens) setProdDiaria(d.itens); else setProdDiaria([]);
        if(d.tunelRegistros) setTunel(d.tunelRegistros); else setTunel([]);
      } else {
        setProdDiaria([]);
        setTunel([]);
      }
    });
    const unsubExp = window.db.collection('expedicaoDiaria').doc(dataAlvo).onSnapshot(s => {
      if(s.exists && s.data().registros) setExpedicao(s.data().registros);
      else setExpedicao([]);
    });
    return () => { unsubProd(); unsubExp(); };
  }, [dataAlvo]);

  // Atualizar contadores a cada 30 segundos
  const [agora, setAgora] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setAgora(new Date()), 30000);
    return () => clearInterval(t);
  }, []);



  function toggleFullScreen() {
    if (!document.fullscreenElement) {
      if(painelRef.current) painelRef.current.requestFullscreen().catch(err => console.log(err));
    } else {
      document.exitFullscreen();
    }
  }

  // === CALCULOS METRICAS MASSEIRA ===
  const totalKilos = prodDiaria.reduce((acc, item) => acc + ((item.feitos || 0) * (item.rendimentoTeorico || 0)), 0);
  const totalReceitas = prodDiaria.reduce((acc, item) => acc + (item.feitos || 0), 0);
  
  let todasBatidas = [];
